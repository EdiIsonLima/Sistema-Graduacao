{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Graduação</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .logo-ct{
            height: 45px;
            width: 45px;
            object-fit: cover;
            border-radius: 50%;
            background-color: white;
            padding: 2px;
        }

        .tabela-alunos {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .badge-faixa {
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .faixa-branca  { background-color: #f8f9fa; color: #000; border: 1px solid #ccc; }
        .faixa-cinza   { background-color: #6c757d; color: #fff; }
        .faixa-amarela { background-color: #ffc107; color: #000; }
        .faixa-laranja { background-color: #fd7e14; color: #fff; }
        .faixa-verde   { background-color: #198754; color: #fff; }
        .faixa-azul    { background-color: #0d6efd; color: #fff; }
        .faixa-roxa    { background-color: #6f42c1; color: #fff; }
        .faixa-marrom  { background-color: #795548; color: #fff; }
        .faixa-preta   { background-color: #212529; color: #fff; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between">

        <span class="navbar-brand fw-bold d-flex align-items-center gap-3">
            <img src="{% static 'alunos/logo.png' %}" class="logo-ct">
            🥋 Sistema de Graduação
        </span>

        {% if user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-outline-light btn-sm">
                Sair
            </button>
        </form>
        {% endif %}

    </div>
</nav>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
