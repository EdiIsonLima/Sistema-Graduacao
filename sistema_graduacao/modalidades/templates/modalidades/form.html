{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="tabela-modalidades p-4">
        <h4 class="fw-bold mb-3">
            {% if object %}
                Editar Modalidade
            {% else %}
                Nova Modalidade
            {% endif %}
        </h4>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-success">
                Salvar
            </button>

            <a href="{% url 'lista_modalidades' %}" 
               class="btn btn-secondary">
                Voltar
            </a>
        </form>
    </div>

</div>

{% endblock %}
