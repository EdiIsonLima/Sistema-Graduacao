{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f8f9fa;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-card {
    width: 380px;
    background: white;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.logo-ct {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 20px;
}

.titulo {
    font-weight: 600;
    margin-bottom: 20px;
}

input {
    height: 42px;
    border-radius: 8px !important;
}

label {
    font-weight: 500;
    margin-bottom: 5px;
}
</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>
<body>

<div class="login-card">

    <img src="{% static 'alunos/logo.png' %}" class="logo-ct">

    <h4 class="titulo">Sistema de Graduação</h4>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3 text-start">
            <label class="form-label">Usuário</label>

            <div class="input-group">
                <input type="text" 
                    name="username" 
                    class="form-control">

                <span class="input-group-text bg-white">
                    <i class="bi bi-person"></i>
                </span>
            </div>
        </div>

        <div class="mb-3 text-start">
            <label class="form-label">Senha</label>

            <div class="input-group">
                <input type="password" 
                    name="password" 
                    id="senha"
                    class="form-control">

                <button type="button" 
                        class="btn btn-outline-secondary"
                        onclick="toggleSenha()">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button class="btn btn-primary w-100">
            Entrar
        </button>
    </form>

</div>

<script>
function toggleSenha() {
    const senha = document.getElementById("senha");
    const icon = document.querySelector("#senha + button i");

    if (senha.type === "password") {
        senha.type = "text";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    } else {
        senha.type = "password";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    }
}
</script>

</body>
</html>
